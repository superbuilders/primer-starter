pre-commit:
  parallel: true
  jobs:
    - name: typecheck
      glob: "*.{ts,tsx}"
      run: bun run typecheck
    - name: lint
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,css}"
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
